worker_processes auto;

events {
    worker_connections 1024;
}

http {
    # ── Basics ────────────────────────────────────────────────────────────────
    sendfile on;
    tcp_nopush on;
    tcp_nodelay on;
    keepalive_timeout 65;
    types_hash_max_size 2048;
    client_max_body_size 50m;

    include /etc/nginx/mime.types;
    default_type application/octet-stream;

    # ── Logging ───────────────────────────────────────────────────────────────
    access_log /var/log/nginx/access.log;
    error_log /var/log/nginx/error.log;

    # ── Gzip ──────────────────────────────────────────────────────────────────
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml;

    # ── Rate limiting ─────────────────────────────────────────────────────────
    limit_req_zone $binary_remote_addr zone=api:10m rate=30r/s;
    limit_req_zone $binary_remote_addr zone=webhook:10m rate=100r/s;

    # ── Upstream ──────────────────────────────────────────────────────────────
    upstream aygency_world {
        server app:3100;
    }

    # ── Health check (for Docker healthcheck) ─────────────────────────────────
    server {
        listen 80;
        server_name localhost;
        location /health {
            return 200 'ok';
            add_header Content-Type text/plain;
        }
    }

    # ── HTTP → HTTPS redirect ─────────────────────────────────────────────────
    server {
        listen 80;
        server_name aygentis.com www.aygentis.com aygencyworld.com www.aygencyworld.com;

        # Certbot challenge
        location /.well-known/acme-challenge/ {
            root /var/www/certbot;
        }

        location / {
            return 301 https://$host$request_uri;
        }
    }

    # ── HTTPS: Aygentis (primary) ────────────────────────────────────────────
    server {
        listen 443 ssl http2;
        server_name aygentis.com www.aygentis.com;

        # SSL certificates (Let's Encrypt via Certbot)
        ssl_certificate /etc/nginx/ssl/live/aygentis.com/fullchain.pem;
        ssl_certificate_key /etc/nginx/ssl/live/aygentis.com/privkey.pem;

        # SSL hardening
        ssl_protocols TLSv1.2 TLSv1.3;
        ssl_ciphers ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384;
        ssl_prefer_server_ciphers off;
        ssl_session_cache shared:SSL:10m;
        ssl_session_timeout 10m;

        # Security headers
        add_header X-Frame-Options DENY always;
        add_header X-Content-Type-Options nosniff always;
        add_header X-XSS-Protection "1; mode=block" always;
        add_header Referrer-Policy strict-origin-when-cross-origin always;
        add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;

        # ── Webhook endpoints (high rate limit, no auth) ─────────────────────
        location /webhook/ {
            limit_req zone=webhook burst=50 nodelay;
            proxy_pass http://aygency_world;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # ── API endpoints ────────────────────────────────────────────────────
        location /api/ {
            limit_req zone=api burst=20 nodelay;
            proxy_pass http://aygency_world;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;

            # SSE support (CEO Chat streaming)
            proxy_http_version 1.1;
            proxy_set_header Connection "";
            proxy_buffering off;
            proxy_cache off;
            proxy_read_timeout 300s;
        }

        # ── WebSocket (live activity) ────────────────────────────────────────
        location /realtime {
            proxy_pass http://aygency_world;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_read_timeout 86400s;
        }

        # ── Everything else (UI) ─────────────────────────────────────────────
        location / {
            proxy_pass http://aygency_world;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }
    }

    # ── HTTPS: aygencyworld.com → 301 redirect to aygentis.com ───────────────
    server {
        listen 443 ssl http2;
        server_name aygencyworld.com www.aygencyworld.com;

        # Keep the existing aygencyworld.com cert for the redirect
        ssl_certificate /etc/nginx/ssl/live/aygencyworld.com/fullchain.pem;
        ssl_certificate_key /etc/nginx/ssl/live/aygencyworld.com/privkey.pem;

        ssl_protocols TLSv1.2 TLSv1.3;
        ssl_ciphers ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384;

        return 301 https://aygentis.com$request_uri;
    }
}
